<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Calendário Acadêmico 2026</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#22c55e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
  :root {--bg:#f3f7f3;--card:#e7f5e7;--card2:#ffffff;--text:#0f172a;--muted:#667085;--green:#2f6f3a;--green2:#63b36b;--exam:#fff2c2;--examBorder:#f2c94c;--holiday:#ffe1e1;--holidayBorder:#fca5a5;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);}
  .wrap{max-width:1180px;margin:0 auto;padding:18px 18px 28px;}
  .top{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px;}
  .btn{width:42px;height:42px;border-radius:10px;border:none;background:var(--green2);color:white;font-size:22px;cursor:pointer;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .title{font-size:22px;font-weight:800;margin:0 6px;text-transform:lowercase;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;}
  #cal{grid-auto-rows:170px;align-items:stretch;}
  .dow{display:flex;align-items:center;justify-content:center;text-align:center;color:#065f46;font-weight:900;font-size:13px;padding:8px 10px;background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.25);border-radius:12px;}
  .day{border-radius:14px;background:var(--card);min-height:150px;height:170px;padding:10px 10px 12px;position:relative;overflow:hidden;cursor:pointer; box-shadow:0 0 0 2px rgba(34,197,94,.15), 0 6px 14px rgba(34,197,94,.15); }
  .day.empty{background:transparent;cursor:default;}
  .day.weekend{background:var(--card2);}
  .day.exam{background:var(--exam);outline:2px solid var(--examBorder);}
  .day.holiday{background:var(--holiday);outline:2px solid var(--holidayBorder);}
  .num{font-weight:900;font-size:14px;margin-bottom:6px;}
  .lines{display:flex;flex-direction:column;gap:8px;font-size:12px;line-height:1.15;}
  .block{background:rgba(255,255,255,.55);border:1px solid rgba(0,0,0,.04);border-radius:10px;padding:6px 7px;}
  .block .hdr{font-weight:900;color:#1b3a20;margin-bottom:3px;font-size:11px;text-transform:uppercase;letter-spacing:.02em;}
  .block .main{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .block .sub{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1b3a20;min-height:1.1em;}
  .mfcMini{margin-top:6px;font-size:11px;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .nisMini{margin-top:6px;font-size:11px;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pill{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.7);padding:3px 8px;border-radius:999px;font-size:11px;font-weight:800;color:#111;}
  .pill.exam{background:var(--examBorder);}
  .pill.holiday{background:var(--holidayBorder);}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;padding:16px;z-index:50;}
  .modal{background:#fff;border-radius:22px;max-width:680px;width:88%;max-height:78vh;overflow:hidden;box-shadow:0 0 0 4px rgba(34,197,94,.25), 0 20px 60px rgba(0,0,0,.25);}
  .mhead{padding:14px 16px;border-bottom:1px solid #eef2f7;display:flex;justify-content:space-between;gap:12px;}
  .mhead h3{margin:0;font-size:16px;}
  .meta{font-size:12px;color:var(--muted);margin-top:4px;}
  .close{border:none;background:transparent;font-size:20px;cursor:pointer;border-radius:10px;padding:4px 8px;}
  .close:hover{background:#f3f4f6;}
  .mbody{padding:14px 16px; padding:18px 20px; overflow:auto; max-height:calc(78vh - 64px); padding:16px 18px;}
  .section{margin-top:12px;}
  .label{font-size:12px;color:var(--muted);margin-bottom:6px;}
  .card{border:1px solid #eef2f7;border-radius:12px;padding:10px 12px;background:#fbfbfb;margin-bottom:10px;}
  .card .t{font-weight:900;margin-bottom:4px;}
  .card .d{color:var(--muted);font-size:13px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media (max-width:720px){ .row2{grid-template-columns:1fr;} }

  /* Notes & checklist */
  .toolsGrid{display:grid;grid-template-columns:1.2fr .8fr;gap:10px;}
  .noteArea{width:100%;min-height:110px;resize:vertical;border:1px solid #e5e7eb;border-radius:10px;padding:10px 10px;font:inherit;font-size:13px;outline:none;}
  .noteArea:focus{border-color:#c7d2fe;box-shadow:0 0 0 3px rgba(99,102,241,.15);}
  .toolBtnRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .toolBtn{border:none;background:#111827;color:white;border-radius:10px;padding:8px 10px;font-weight:800;font-size:12px;cursor:pointer;}
  .toolBtn.secondary{background:#eef2f7;color:#111827;}
  .toolHint{font-size:12px;color:var(--muted);margin-top:6px;}
  .checkList{display:flex;flex-direction:column;gap:10px;}
  .checkItem{display:flex;align-items:center;gap:10px;border:1px solid #eef2f7;background:#fff;border-radius:12px;padding:10px 12px;}
  .checkItem input{width:18px;height:18px;}
  .checkItem label{font-weight:800;}
  .checkItem small{display:block;color:var(--muted);font-weight:600;margin-top:2px;}
  @media (max-width:720px){ .toolsGrid{grid-template-columns:1fr;} }


  /* Pop-up navigation bar */
  .popNav{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 14px 0;}
  .popNav button{border:1px solid #e5e7eb;background:#fff;border-radius:999px;padding:7px 10px;font-weight:900;font-size:12px;cursor:pointer;}
  .popNav button:hover{background:#f3f4f6;}
  .section .label{display:flex;align-items:center;gap:10px;}
  .section .label:before{content:"";width:10px;height:10px;border-radius:3px;background:var(--green2);display:inline-block;}
  .section .label{padding:6px 0;border-bottom:1px solid #eef2f7;margin-bottom:10px;}

  /* Estudo: bloco ocupa a largura toda, checklist horizontal e menor abaixo */
  .toolsGrid{display:grid;grid-template-columns:1fr;gap:10px;}
  .checkList{display:grid;grid-template-columns:repeat(3, minmax(0,1fr));gap:8px;margin-top:8px;}
  .checkItem{display:flex;align-items:center;gap:10px;border:1px solid #eef2f7;background:#fff;border-radius:12px;padding:8px 10px;}
  .checkItem input{width:16px;height:16px;}
  .checkItem label{font-weight:900;font-size:13px;}
  .checkItem small{display:block;color:var(--muted);font-weight:600;margin-top:1px;font-size:12px;}
  @media (max-width:720px){ .checkList{grid-template-columns:1fr;} }


  /* Modal dashboard header + icons */
  .mhead{background:linear-gradient(90deg, rgba(34,197,94,.22), rgba(34,197,94,.08)); border-bottom:1px solid #e8f3ea;}
  .mhead .title{display:flex;align-items:center;gap:10px;}
  .mBadge{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.25);}
  .mDot{width:10px;height:10px;border-radius:3px;background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.15);}
  .secIcon{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.22);margin-right:8px;}
  .secIcon svg{width:14px;height:14px;opacity:.95}
  .labelRow{display:flex;align-items:center;gap:6px;}
  .labelRow .txt{font-weight:900}


  /* Modal animation + pin */
  #overlay{opacity:0; transition: opacity .18s ease;}
  #overlay.show{opacity:1;}
  #modal{transform: translateY(10px) scale(.985); opacity:0; transition: transform .18s ease, opacity .18s ease;}
  #modal.show{transform: translateY(0) scale(1); opacity:1;}
  .pinBtn{border:1px solid rgba(34,197,94,.35); background:rgba(34,197,94,.10); color:#14532d; border-radius:999px; padding:7px 10px; font-weight:900; font-size:12px; cursor:pointer;}
  .pinBtn:hover{background:rgba(34,197,94,.16);}
  .pinBtn.pinned{background:rgba(34,197,94,.22); border-color:rgba(34,197,94,.55);}

  .ambu{position:absolute; top:8px; right:8px; font-size:14px; line-height:1; opacity:.95; filter: drop-shadow(0 1px 2px rgba(0,0,0,.12));}


  


  .countdown{margin-top:6px;text-align:center;font-weight:900;color:#f97316;font-size:14px;}
  .countdown small{font-weight:700;color:#fb923c;}


  .editablePop{outline:none;}
  .editablePop:focus{box-shadow:0 0 0 2px rgba(34,197,94,.25); border-radius:10px; padding:2px 4px;}
  .card .saveRow{display:flex; justify-content:flex-end; gap:8px; margin-top:8px;}
  .card .saveBtn{font-size:12px; font-weight:800; padding:6px 10px; border-radius:999px; border:1px solid rgba(15,23,42,.12); background:#0f172a; color:white; cursor:pointer;}
  .card .saveBtn.secondary{background:#f1f5f9; color:#0f172a;}
  .card .saveBtn[hidden]{display:none;}


  .apptBox{display:flex; flex-direction:column; gap:10px;}
  .apptBox textarea{width:100%; min-height:90px; resize:vertical; padding:10px 12px; border-radius:14px; border:1px solid rgba(15,23,42,.12); font:inherit; font-size:13px; line-height:1.35; background:white;}
  .apptActions{display:flex; justify-content:flex-end; gap:8px;}
  .pill.appt{background:transparent;color:#0f172a;border:none;box-shadow:none;font-size:14px;}


  .holidayStamp{margin-top:10px;background:rgba(249,115,22,.22);border:1px solid rgba(249,115,22,.35);border-radius:14px;padding:10px 10px;font-weight:1000;color:#7c2d12;text-transform:uppercase;letter-spacing:.03em;text-align:center;line-height:1.15;}
  .holidayStamp .top{font-size:12px;}
  .holidayStamp .bot{font-size:14px;margin-top:4px;}


  .weekendMot{position:relative;background:#f1f5f9;border-radius:14px;padding:12px 26px 12px 26px;margin-top:10px;font-weight:700;color:#065f46;font-size:12px;line-height:1.25;}
  .weekendMot .star1{position:absolute;top:6px;left:8px;font-size:14px;}
  .weekendMot .star2{position:absolute;bottom:6px;right:8px;font-size:14px;}


  @keyframes sparkle{0%,100%{transform:scale(1);opacity:.85;filter:drop-shadow(0 0 0 rgba(34,197,94,0));}
  50%{transform:scale(1.12);opacity:1;filter:drop-shadow(0 0 6px rgba(34,197,94,.35));}}
  .weekendMot .star1,.weekendMot .star2{animation:sparkle 2.6s ease-in-out infinite;}
  .weekendMot .star2{animation-delay:1.1s;}


  .pill.chk{background:transparent;color:#22c55e;border:none;box-shadow:none;font-size:14px;font-weight:900;}


  .weekendDone{margin-top:10px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.22);border-radius:14px;padding:8px 10px;font-weight:900;color:#065f46;font-size:12px;display:flex;align-items:center;justify-content:center;gap:8px;}


  .pillStack{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:6px;align-items:flex-end;z-index:5;}


  .weekendBadge{margin-top:10px;background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.20);border-radius:999px;padding:6px 10px;font-weight:900;color:#065f46;font-size:12px;display:inline-flex;align-items:center;justify-content:center;gap:6px;}

  .pillStack .pill{position:static;}

  .successBadge{margin-top:10px;background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.20);border-radius:999px;padding:6px 10px;font-weight:900;color:#065f46;font-size:12px;display:inline-flex;align-items:center;justify-content:center;gap:6px;}


  /* 
    <div class="minutesRow">
      <label for="minutesInput" class="minutesLbl">Minutos estudados hoje</label>
      <input id="minutesInput" class="minutesInp" type="number" min="0" step="5" placeholder="(opcional)">
      <button class="minutesBtn" id="saveMinutesBtn" type="button">Salvar</button>
    </div>
Checklist do sucesso (4 em linha) */
  .checkList{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:8px;width:100%;}
  .checkItem{display:flex;align-items:center;gap:8px;border:1px solid #eef2f7;background:#fff;border-radius:12px;padding:7px 8px;min-height:54px;}
  .checkItem input{width:18px;height:18px;flex:0 0 auto;}
  .checkItem>div{min-width:0;}
  .checkItem label{font-weight:900;font-size:12px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .checkItem small{display:block;color:var(--muted);font-weight:600;margin-top:1px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  @media (max-width:720px){ .checkList{grid-template-columns:repeat(2,minmax(0,1fr));} }

  /* animação leve ao marcar */
  @keyframes tickPop{0%{transform:scale(1);}60%{transform:scale(1.06);}100%{transform:scale(1);}}
  .checkItem.checked{box-shadow:0 0 0 2px rgba(34,197,94,.18);animation:tickPop .22s ease-out;}


  .streakBar{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;font-weight:1000;}
  .streakBar .flame{font-size:16px;line-height:1;}
  .streakBar .txt{font-size:13px;color:#0f172a;}
  .streakBar .num{font-size:13px;color:#ea580c;background:rgba(234,88,12,.10);border:1px solid rgba(234,88,12,.25);padding:4px 10px;border-radius:999px;}
  .dateFlame{font-size:13px;margin-left:6px;opacity:.95;}


  .nisInline{margin-top:10px;background:rgba(255,255,255,.55);border:1px solid rgba(0,0,0,.04);border-radius:10px;padding:6px 7px;font-weight:1000;color:#1b3a20;display:flex;align-items:center;gap:6px;}
  .nisInline .tag{background:rgba(16,185,129,.14);border:1px solid rgba(16,185,129,.22);color:#065f46;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:1000;}


  /* 🔥 Animação do foguinho (suave) */
  @keyframes flameFlicker{
    0%,100%{transform:translateY(0) scale(1); filter:drop-shadow(0 0 0 rgba(234,88,12,0)); opacity:.92;}
    35%{transform:translateY(-1px) scale(1.06); filter:drop-shadow(0 0 6px rgba(234,88,12,.35)); opacity:1;}
    70%{transform:translateY(0) scale(1.02); filter:drop-shadow(0 0 3px rgba(234,88,12,.22)); opacity:.98;}
  }
  .dateFlame{display:inline-block;margin-left:6px;animation:flameFlicker 1.6s ease-in-out infinite;transform-origin:center;}
  .streakBar .flame{display:inline-block;animation:flameFlicker 1.9s ease-in-out infinite;}


  /* Dashboard médico */
  .dash{margin:10px 0 10px;display:flex;gap:12px;align-items:stretch;justify-content:space-between;}
  .dashLeft{flex:1;display:flex;flex-direction:column;gap:10px;}
  .dashBrand{display:flex;align-items:center;gap:10px;}
  .dashIcon{font-size:22px;}
  .dashTitle{font-weight:1100;color:#064e3b;font-size:14px;letter-spacing:.02em;}
  .dashSub{font-weight:800;color:#0f172a;opacity:.65;font-size:12px;}
  .dashRight{display:flex;gap:12px;align-items:stretch;}
  .dashCard{background:rgba(255,255,255,.55);border:1px solid rgba(0,0,0,.04);border-radius:16px;padding:10px 12px;min-width:240px;box-shadow:0 10px 26px rgba(2, 6, 23, .06);backdrop-filter: blur(8px);}
  .dashLabel{font-weight:1100;color:#0f172a;font-size:12px;opacity:.8;margin-bottom:6px;}
  .progRow{display:flex;align-items:center;gap:10px;}
  .progBar{flex:1;height:10px;background:rgba(2,6,23,.06);border-radius:999px;overflow:hidden;}
  .progFill{height:100%;width:0%;background:rgba(34,197,94,.75);border-radius:999px;transition:width .25s ease;}
  .progTxt{font-weight:1100;color:#ea580c;font-size:12px;min-width:42px;text-align:right;}
  .dashTiny{font-weight:850;color:#0f172a;opacity:.55;font-size:12px;margin-top:6px;}
  .duoRow{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .duoCount{font-weight:1200;color:#0f172a;font-size:14px;display:flex;align-items:center;gap:6px;}
  .duoCount .fl{display:inline-block;animation:flameFlicker 1.9s ease-in-out infinite;}
  .duoDots{display:flex;gap:6px;align-items:center;}
  .dot{width:12px;height:12px;border-radius:999px;background:rgba(2,6,23,.10);border:1px solid rgba(2,6,23,.08);}
  .dot.on{background:rgba(34,197,94,.65);border-color:rgba(34,197,94,.35);box-shadow:0 0 0 3px rgba(34,197,94,.14);}
  .dashChartCard{margin:0 0 8px;background:rgba(255,255,255,.55);border:1px solid rgba(0,0,0,.04);border-radius:16px;padding:10px 12px;box-shadow:0 10px 26px rgba(2, 6, 23, .06);backdrop-filter: blur(8px);}
  .weekBars{display:flex;gap:10px;align-items:flex-end;min-height:54px;margin-top:6px;}
  .wBar{flex:1;background:rgba(2,6,23,.06);border-radius:12px;position:relative;overflow:hidden;}
  .wFill{position:absolute;left:0;right:0;bottom:0;height:0%;background:rgba(34,197,94,.70);transition:height .25s ease;}
  .wLbl{position:absolute;top:6px;left:8px;font-size:11px;font-weight:1000;color:#0f172a;opacity:.65;}
  .wVal{position:absolute;bottom:6px;right:8px;font-size:11px;font-weight:1100;color:#065f46;}
  @media (max-width:980px){
    .dash{flex-direction:column;}
    .dashRight{flex-direction:column;}
    .dashCard{min-width:unset;}
  }


  /* 🔥 Efeito quando completar os 4 checks */
  .flameBurst{position:absolute;inset:0;border-radius:22px;pointer-events:none;opacity:0;display:flex;align-items:flex-start;justify-content:center;overflow:hidden;}
  .flameBurst.on{opacity:1;animation:burstFade 1.35s ease-out forwards;}
  .flameTop{margin-top:10px;font-size:30px;letter-spacing:6px;filter:drop-shadow(0 0 10px rgba(234,88,12,.35));animation:flameWave .55s ease-in-out infinite;}
  .flameGlow{position:absolute;top:-40px;left:-60px;right:-60px;height:180px;background:radial-gradient(circle at 50% 35%, rgba(234,88,12,.38), rgba(234,88,12,.12) 45%, rgba(234,88,12,0) 70%);filter:blur(6px);animation:glowPulse 1.35s ease-out forwards;}
  @keyframes burstFade{0%{opacity:0;transform:scale(.98);}10%{opacity:1;transform:scale(1);}75%{opacity:1;}100%{opacity:0;transform:scale(1.01);}}
  @keyframes flameWave{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-3px) rotate(1deg);}}
  @keyframes glowPulse{0%{opacity:0;transform:translateY(12px);}20%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-10px);}}


  .dashQuote{
    margin-top:8px;
    max-width:520px;
    background:rgba(255,255,255,.45);
    border:1px solid rgba(0,0,0,.04);
    border-radius:14px;
    padding:10px 12px;
    font-weight:900;
    color:#0f172a;
    line-height:1.25;
    box-shadow:0 8px 22px rgba(2, 6, 23, .05);
  }
  .dashQuote .tag{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:rgba(34,197,94,.12);
    border:1px solid rgba(34,197,94,.22);
    color:#065f46;
    font-weight:1100;
    border-radius:999px;
    padding:4px 10px;
    font-size:12px;
    margin-bottom:8px;
  }
  .dashQuote .txt{font-weight:950;font-size:13px;color:#0f172a;opacity:.9;}
  .dashQuote.fade{opacity:0;transform:translateY(-2px);}
  .dashQuote{transition:opacity .45s ease, transform .45s ease; opacity:1; transform:translateY(0);}


  .dashActions{margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .dashBtn{
    appearance:none;border:1px solid rgba(2,6,23,.10);
    background:rgba(255,255,255,.55);
    border-radius:999px;padding:7px 10px;
    font-weight:1100;font-size:12px;color:#0f172a;
    box-shadow:0 8px 18px rgba(2, 6, 23, .05);
    cursor:pointer;
  }
  .dashBtn:hover{transform:translateY(-1px);}
  .dashUser{font-weight:950;font-size:12px;color:#065f46;opacity:.9}

  .bigMetric{display:flex;align-items:baseline;gap:6px;margin:6px 0 2px 0}
  .bigMetric #hoursMonth{font-size:26px;font-weight:1200;color:#0f172a}
  .bigMetric .unit{font-size:13px;font-weight:1100;color:#334155;opacity:.85}
  .discRow{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
  .pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:1100;border:1px solid rgba(2,6,23,.08)}
  .pill.mfc{background:rgba(34,197,94,.10);color:#065f46;border-color:rgba(34,197,94,.20)}
  .pill.em{background:rgba(16,185,129,.10);color:#065f46;border-color:rgba(16,185,129,.20)}
  .pill.est{background:rgba(59,130,246,.10);color:#1e3a8a;border-color:rgba(59,130,246,.18)}
  .discVal{font-weight:1200;color:#0f172a}

function isoDate(day){const y=day.getFullYear(); const m=String(day.getMonth()+1).padStart(2,'0'); const d=String(day.getDate()).padStart(2,'0'); return `${y}-${m}-${d}`; }
function fmtLong(day){ return day.toLocaleDateString("pt-BR", { weekday:"long", day:"2-digit", month:"long", year:"numeric" }); }
function inRange(day,start,end){ return day>=start && day<=end; }

function findModelForDate(day){
  for(const p of PERIODS){ const sd=toDate(p.start), ed=toDate(p.end); if(inRange(day,sd,ed)) return String(p.model); }
  return null;
}
function findExam(day){ const s=isoDate(day); return EXAMS.find(e=>e.date===s) || null; }
function findHoliday(day){ const s=isoDate(day); return HOLIDAYS.find(e=>e.date===s) || null; }

}

function keepLine(text){ const t=norm(text); if(!t) return false; if(t.includes("sala de aula")) return false; if(t.includes("intervalo")) return false; return true; }

function buildWeekForDay(day){
  const modelKey=findModelForDate(day);
  const weekday=(day.getDay()+6)%7;
  if(!modelKey || weekday>4) return {modelKey, morning:[], afternoon:[]};
  const rows=MODELS[modelKey]?.rows || [];
  const split=MODELS[modelKey]?.split;
  const col=weekday;
  const morning=[], afternoon=[];
  rows.forEach((r, idx)=>{
    const text=(r[col]||"").trim();
    if(!keepLine(text)) return;
    if (split === null || split === undefined) {
      morning.push(text);
    } else {
      if(idx < split) morning.push(text);
      else if (idx > split) afternoon.push(text);
    }
  });
  return {modelKey, morning, afternoon};
}


function joinSub(base, add){
  if(!add) return base || "";
  const b = (base||"").trim();
  if(!b) return add;
  const up = b.toUpperCase();
  if(up.includes(add.toUpperCase())) return b;
  return b + " • " + add;
}

}

function daysBetween(d1, d2){
  // datas em meia-noite local para evitar problemas de fuso
  const a = new Date(d1.getFullYear(), d1.getMonth(), d1.getDate());
  const b = new Date(d2.getFullYear(), d2.getMonth(), d2.getDate());
  return Math.round((b - a) / (1000*60*60*24));
}

function updateCountdown(){
  const el = document.getElementById("countdown");
  if(!el) return;

  const today = new Date();
  const exams = parseExamDates()
    .map(x => ({...x, d: new Date(x.date+"T00:00:00")}))
    .filter(x => !isNaN(x.d.getTime()))
    .sort((a,b)=>a.d-b.d);

  const next = exams.find(x => daysBetween(today, x.d) >= 0);
  if(!next){
    el.textContent = "";
    return;
  }
  const diff = daysBetween(today, next.d);
  const dd = String(next.d.getDate()).padStart(2,"0");
  const mm = String(next.d.getMonth()+1).padStart(2,"0");

  if(diff === 0){
    el.innerHTML = `🚨 <span>É HOJE: ${next.label}</span> <small>(${dd}/${mm})</small>`;
  }else if(diff === 1){
    el.innerHTML = `⏳ <span>Falta 1 dia para a próxima prova</span> <small>(${dd}/${mm})</small>`;
  }else{
    el.innerHTML = `⏳ <span>Faltam ${diff} dias para a próxima prova</span> <small>(${dd}/${mm})</small>`;
  }
}

function buildMonthStudyStats(year, monthIndex){
  const daysInMonth = new Date(year, monthIndex+1, 0).getDate();
  let studiedDays = 0;
  let maxStreak = 0;
  let curStreak = 0;
  const set = new Set();
  for(let d=1; d<=daysInMonth; d++){
    const day = new Date(year, monthIndex, d, 12,0,0);
    const iso = isoDate(day);
    const did = studied(iso);
    if(did){
      studiedDays++;
      set.add(iso);
      curStreak++;
      if(curStreak > maxStreak) maxStreak = curStreak;
    }else{
      curStreak = 0;
    }
  }
  return {studiedDays, maxStreak, set};
}

function dayIndexLocal(){
  const now = new Date();
  // índice estável por dia no fuso local: YYYY-MM-DD
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,"0");
  const d = String(now.getDate()).padStart(2,"0");
  const s = y + "-" + m + "-" + d;
  // hash simples
  let h = 0;
  for(let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i))>>>0;
  return h % DASH_QUOTES.length;
}

function storageKey(dateISO){ return "cal2026:" + dateISO; }

  try{
    const raw = localStorage.getItem(storageKey(dateISO));
    if(!raw) return {note:"", checks:{chapter:false,resumo:false,flash:false,sim:false}};
    const obj = JSON.parse(raw);
    return {
      note: obj.note || "",
      checks: {
        chapter: !!(obj.checks && obj.checks.chapter),
        resumo:  !!(obj.checks && obj.checks.resumo),
        flash:   !!(obj.checks && obj.checks.flash),
        sim:     !!(obj.checks && obj.checks.sim)
      }
    };
  }catch(e){
    return {note:"", checks:{chapter:false, resumo:false, flash:false, sim:false}};
  }
}

function enablePopupEditing(dateISO){
  const body = document.getElementById("mbody");
  if(!body) return;

  const cards = Array.from(body.querySelectorAll(".card"));
  cards.forEach((card, i)=>{
    const t = card.querySelector(".t");
    const d = card.querySelector(".d");

    // Se o card não tem a estrutura padrão, ignora
    if(!t || !d) return;

    // Corrige "undefined"
    if((t.textContent||"").trim().toLowerCase() === "undefined") t.textContent = "";
    if((d.textContent||"").trim().toLowerCase() === "undefined") d.textContent = "";

    // aplica texto salvo
    const saved = loadEdit(dateISO, i);
    if(saved){
      if(typeof saved.t === "string") t.textContent = saved.t;
      if(typeof saved.d === "string") d.textContent = saved.d;
    }

    // tornar editável
    [t,d].forEach(el=>{
      el.setAttribute("contenteditable","true");
      el.setAttribute("spellcheck","false");
      el.classList.add("editablePop");
      ["mousedown","click","dblclick","touchstart"].forEach(evt=>{
        el.addEventListener(evt, (e)=>{ e.stopPropagation(); });
      });
    });

    // botão salvar (por card)
    let row = card.querySelector(".saveRow");
    if(!row){
      row = document.createElement("div");
      row.className = "saveRow";
      const btn = document.createElement("button");
      btn.className = "saveBtn";
      btn.textContent = "Salvar";
      btn.hidden = true;

      const btnCancel = document.createElement("button");
      btnCancel.className = "saveBtn secondary";
      btnCancel.textContent = "Desfazer";
      btnCancel.hidden = true;

      row.appendChild(btnCancel);
      row.appendChild(btn);
      card.appendChild(row);

      const markDirty = ()=>{ btn.hidden = false; btnCancel.hidden = false; };
      t.addEventListener("input", markDirty);
      d.addEventListener("input", markDirty);

      btnCancel.addEventListener("click", (e)=>{
        e.stopPropagation();
        const prev = loadEdit(dateISO, i);
        if(prev){
          t.textContent = prev.t || "";
          d.textContent = prev.d || "";
        }else{
          // volta ao texto atual original não salvo (não temos mais), então só limpa
          // e mantém do jeito que está.
        }
        btn.hidden = true; btnCancel.hidden = true;
      });

      btn.addEventListener("click", (e)=>{
        e.stopPropagation();
        const obj = { t: t.textContent.trim(), d: d.textContent.trim() };
        saveEdit(dateISO, i, obj);

        // lembrete na célula (primeiro título editado)
        let first = "";
        for(let k=0;k<cards.length;k++){
          const ed = loadEdit(dateISO, k);
          if(ed && ed.t && ed.t.trim()){
            first = ed.t.trim();
            break;
          }
        }
        if(!first) first = obj.t;
        saveMeta(dateISO, first);
        btn.hidden = true; btnCancel.hidden = true;

        // re-render para refletir lembrete
        if(typeof render === "function") render();
      });
    }
  });
}

/* =====================
   Login Google (opcional) + Sincronização (Firebase)
   -> Só ativa se você preencher firebaseConfig.
   ===================== */
const firebaseConfig = {
  // Cole aqui (Firebase Console -> Project settings -> Web app config)
  apiKey: "",
  authDomain: "",
  projectId: "",
  appId: "",
};

let _fb = { enabled:false, user:null };

async function initFirebaseIfConfigured(){
  const ok = firebaseConfig && firebaseConfig.apiKey && firebaseConfig.authDomain && firebaseConfig.projectId;
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  if(!ok){
    if(loginBtn) loginBtn.style.display = "none";
    if(logoutBtn) logoutBtn.style.display = "none";
    return;
  }
  if(loginBtn) loginBtn.style.display = "inline-flex";

  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
  const { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js");
  const { getFirestore, doc, getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js");

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  _fb = { enabled:true, user:null, db, doc, getDoc, setDoc, auth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut };

  const dashUser = document.getElementById("dashUser");
  const provider = new GoogleAuthProvider();

  async function login(){ try{ await signInWithPopup(auth, provider); }catch(e){ console.warn(e); } }
  async function logout(){ try{ await signOut(auth); }catch(e){} }

  if(loginBtn) loginBtn.addEventListener("click", login);
  if(logoutBtn) logoutBtn.addEventListener("click", logout);

  onAuthStateChanged(auth, async (user)=>{
    _fb.user = user || null;
    if(user){
      if(loginBtn) loginBtn.style.display = "none";
      if(logoutBtn) logoutBtn.style.display = "inline-flex";
      if(dashUser){ dashUser.style.display="inline"; dashUser.textContent = "Olá, " + (user.displayName?.split(" ")[0] || ""); }

      // puxa nuvem -> local (somente se local estiver vazio)
      try{
        const ref = doc(db, "calendars", user.uid);
        const snap = await getDoc(ref);
        if(snap.exists()){
          const cloud = snap.data()?.payload || null;
          if(cloud){
            const local = localStorage.getItem(STORAGE_KEY);
            if(!local){
              localStorage.setItem(STORAGE_KEY, JSON.stringify(cloud));
              if(typeof render==="function") render();
            }
          }
        }
      }catch(e){ console.warn(e); }
    }else{
      if(loginBtn) loginBtn.style.display = "inline-flex";
      if(logoutBtn) logoutBtn.style.display = "none";
      if(dashUser){ dashUser.style.display="none"; dashUser.textContent=""; }
    }
  });
}

async function syncToCloudDebounced(){
  if(!_fb.enabled || !_fb.user) return;
  clearTimeout(window.__syncTimer);
  window.__syncTimer = setTimeout(async ()=>{
    try{
      const payload = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
      if(!payload) return;
      const ref = _fb.doc(_fb.db, "calendars", _fb.user.uid);
      await _fb.setDoc(ref, { payload, updatedAt: Date.now() }, { merge:true });
    }catch(e){ console.warn(e); }
  }, 800);
}

// intercepta salvamento do STORAGE_KEY e sincroniza
(function hookCloudSync(){
  const _setItem = localStorage.setItem.bind(localStorage);
  localStorage.setItem = function(k, v){
    _setItem(k, v);
    if(k === STORAGE_KEY) syncToCloudDebounced();
  };
  window.addEventListener("load", ()=>{ initFirebaseIfConfigured(); });
})();


// ----- Dashboard extra: horas / disciplinas / meta -----
const GOAL_KEY = "CAL2026_GOAL_DAYS";
function getGoalDays(){ return parseInt(localStorage.getItem(GOAL_KEY) || "20", 10); }
function setGoalDays(n){ localStorage.setItem(GOAL_KEY, String(n)); }

function monthKeyFromDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  return y+"-"+m;
}

// estimativa por checks: 30min por check (padrão) ou override por dia (minutos)
function getDayMinutes(dateISO, data){
  const day = (data?.days && data.days[dateISO]) ? data.days[dateISO] : null;
  if(!day) return 0;
  if(typeof day.minutes === "number" && isFinite(day.minutes) && day.minutes >= 0) return day.minutes;
  const c = day.checks ? Object.values(day.checks).filter(Boolean).length : 0;
  return c * 30;
}

function countDisciplinesForDay(day){
  let mfc=0, em=0, study=0;
  if(!day) return {mfc, em, study};
  const checks = day.checks ? Object.values(day.checks).filter(Boolean).length : 0;
  if(checks>0) study = 1;
  if(day.schedule && Array.isArray(day.schedule)){
    for(const s of day.schedule){
      const t = (s?.title||"").toLowerCase();
      if(t.includes("mfc")) mfc=1;
      if(t.includes("emerg")) em=1;
    }
  }
  if(day.mfc && Array.isArray(day.mfc) && day.mfc.length) mfc=1;
  if(day.emerg && Array.isArray(day.emerg) && day.emerg.length) em=1;
  return {mfc, em, study};
}

function updateExtraDashboard(){
  const fill = document.getElementById("monthProgFill");
  const meta = document.getElementById("monthProgMeta");
  const hoursEl = document.getElementById("hoursMonth");
  const mfcEl = document.getElementById("mfcCount");
  const emEl = document.getElementById("emCount");
  const stEl = document.getElementById("studyCount");
  const goalFill = document.getElementById("goalFill");
  const goalTxt = document.getElementById("goalTxt");
  const goalMeta = document.getElementById("goalMeta");

  const d = (typeof currentMonthDate !== "undefined" && currentMonthDate instanceof Date) ? currentMonthDate : new Date();
  let totalDaysInMonth = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();

  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  const days = data?.days || {};

  let studiedDays = 0;
  let minutes = 0;
  let mfc=0, em=0, st=0;

  for(let day=1; day<=totalDaysInMonth; day++){
    const iso = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
    const payload = days[iso];
    const checks = payload?.checks ? Object.values(payload.checks).filter(Boolean).length : 0;
    if(checks>0) studiedDays += 1;
    minutes += getDayMinutes(iso, data);
    const c = countDisciplinesForDay(payload);
    mfc += c.mfc;
    em += c.em;
    st += c.study;
  }

  const pct = totalDaysInMonth ? Math.round((studiedDays/totalDaysInMonth)*100) : 0;
  if(fill) fill.style.width = pct + "%";
  const txt = document.getElementById("monthProgTxt");
  if(txt) txt.textContent = pct + "%";
  if(meta) meta.textContent = `${studiedDays}/${totalDaysInMonth} dias estudados`;

  if(hoursEl) hoursEl.textContent = (minutes/60).toFixed(1);
  if(mfcEl) mfcEl.textContent = String(mfc);
  if(emEl) emEl.textContent = String(em);
  if(stEl) stEl.textContent = String(st);

  const goal = getGoalDays();
  const gp = goal ? Math.min(100, Math.round((studiedDays/goal)*100)) : 0;
  if(goalFill) goalFill.style.width = gp + "%";
  if(goalTxt) goalTxt.textContent = gp + "%";
  if(goalMeta) goalMeta.textContent = `${studiedDays}/${goal} dias`;
}

function bindGoalButton(){
  const btn = document.getElementById("setGoalBtn");
  if(!btn) return;
  btn.addEventListener("click", ()=>{
    const cur = getGoalDays();
    const v = prompt("Qual sua meta de DIAS estudados neste mês? (ex: 20)", String(cur));
    if(v===null) return;
    const n = Math.max(1, Math.min(31, parseInt(v,10) || cur));
    setGoalDays(n);
    updateExtraDashboard();
  });
}


function loadMinutesIntoModal(dateISO){
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  const day = data?.days?.[dateISO] || {};
  const inp = document.getElementById("minutesInput");
  if(!inp) return;
  const v = (typeof day.minutes === "number") ? day.minutes : "";
  inp.value = v === 0 ? 0 : (v || "");
}
function saveMinutesFromModal(dateISO){
  const inp = document.getElementById("minutesInput");
  if(!inp) return;
  const raw = inp.value;
  const n = raw === "" ? null : Math.max(0, parseInt(raw,10) || 0);
  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  data.days = data.days || {};
  data.days[dateISO] = data.days[dateISO] || {};
  if(n === null) delete data.days[dateISO].minutes;
  else data.days[dateISO].minutes = n;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  if(typeof render==="function") render();
  if(typeof updateDashboard==="function") updateDashboard();
  try{ updateExtraDashboard(); }catch(e){}
}
